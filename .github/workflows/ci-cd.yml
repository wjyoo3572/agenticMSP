name: AgenticMSP CI/CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_CLIENT_ID: b4adbc6c-1f73-4f07-8767-eb84282b6325
  AZURE_TENANT_ID: 6144959d-620b-4d3d-9090-c4891f1914ce
  AZURE_SUBSCRIPTION_ID: c32029ab-0ba9-4306-8617-32defb900cd0
  AZURE_LOCATION: koreacentral
  RESOURCE_GROUP_NAME: RG-YWJ-AgenticMSP-20260701
  REGISTRY_NAME: acragenticmspsii4hl
  CONTAINER_APP_NAME: ca-agenticmsp-sii4hl
  IMAGE_REPOSITORY: agenticmsp-portal

jobs:
  validate:
    name: Validate application and infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/portal/package-lock.json

      - name: Install portal dependencies
        working-directory: src/portal
        run: npm ci

      - name: Run portal tests
        working-directory: src/portal
        run: npm test

      - name: Sign in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        shell: bash
        run: |
          set -euo pipefail
          az bicep build --file infra/main.bicep
          az deployment sub validate \
            --name "agenticmsp-ci-validate-${GITHUB_RUN_ID}" \
            --location "$AZURE_LOCATION" \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json deployAcrPullRole=false

  deploy:
    name: Build and deploy portal
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: validate
    runs-on: ubuntu-latest
    environment: agenticmsp-development
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sign in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Build image and deploy Container App
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG="$GITHUB_RUN_ID"
          IMAGE="$REGISTRY_NAME.azurecr.io/$IMAGE_REPOSITORY:$IMAGE_TAG"

          az acr build \
            --registry "$REGISTRY_NAME" \
            --image "$IMAGE_REPOSITORY:$IMAGE_TAG" \
            --file src/portal/Dockerfile .

          az deployment sub create \
            --name "agenticmsp-ci-${GITHUB_RUN_ID}" \
            --location "$AZURE_LOCATION" \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json applicationImage="$IMAGE" deployAcrPullRole=false

          FQDN=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          curl --fail --retry 12 --retry-delay 10 "https://${FQDN}/health"
