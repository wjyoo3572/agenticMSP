trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

variables:
  azureLocation: koreacentral
  resourceGroupName: RG-YWJ-AgenticMSP-20260701
  registryName: acragenticmspsii4hl
  containerAppName: ca-agenticmsp-sii4hl
  imageRepository: agenticmsp-portal
  imageTag: $(Build.BuildId)

stages:
  - stage: Validate
    displayName: Validate application and infrastructure
    jobs:
      - job: Validate
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: 22.x
          - script: npm test
            workingDirectory: src/portal
            displayName: Run portal tests
          - task: AzureCLI@2
            displayName: Validate Bicep
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az bicep build --file infra/main.bicep
                az deployment sub validate \
                  --name agenticmsp-ci-validate-$(Build.BuildId) \
                  --location $(azureLocation) \
                  --template-file infra/main.bicep \
                  --parameters infra/main.parameters.json

  - stage: Deploy
    displayName: Build and deploy portal
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    jobs:
      - deployment: DeployPortal
        environment: agenticmsp-development
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: AzureCLI@2
                  displayName: Build image and deploy Container App
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      IMAGE="$(registryName).azurecr.io/$(imageRepository):$(imageTag)"

                      az acr build \
                        --registry $(registryName) \
                        --image "$(imageRepository):$(imageTag)" \
                        --file src/portal/Dockerfile .

                      az deployment sub create \
                        --name agenticmsp-ci-$(Build.BuildId) \
                        --location $(azureLocation) \
                        --template-file infra/main.bicep \
                        --parameters infra/main.parameters.json applicationImage="$IMAGE"

                      FQDN=$(az containerapp show \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroupName) \
                        --query properties.configuration.ingress.fqdn \
                        --output tsv)
                      curl --fail --retry 12 --retry-delay 10 "https://${FQDN}/health"

